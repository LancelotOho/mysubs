mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
mode: rule
log-level: warning
external-controller: "0.0.0.0:9090"
secret: "li19882008"
bind-address: "*"
ipv6: false
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: false
  prefer-h3: false
  listen: "0.0.0.0:7874"
  use-hosts: false
  use-system-hosts: false
  respect-rules: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - asusrouter.com
    - router.asus.com
    - www.asusrouter.com
    - oasisauth.h3c.com
    - routerlogin.com
    - www.routerlogin.com
    - tplogin.cn
    - miwifi.com
    - www.miwifi.com
    - +.internal
    - +.localdomain
    - +.example
    - +.invalid
    - +.localhost
    - +.test
    - +.local
    - +.lan
    - +.zte.home
    - +.my.router
    - +.ts.net
    - +.home.arpa
    - +.hiwifi.com
    - +.tplinkwifi.net
    - +.tendawifi.com
    - +.leike.cc
    - +.plex.direct
    - +.router.ctc
    - +.phicomm.me
    - +.peiluyou.com
    - +.127.in-addr.arpa
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://8.8.4.4
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
      - 443
    TLS:
      ports:
      - 443
      - 8443
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
  parse-pure-ip: true
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geodata-loader: standard
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb"
profile:
  store-selected: true
  store-fake-ip: true
