# updated 2026-02-25 13:01:00
mixed-port: 7890
port: 7891
socks-port: 7892
allow-lan: true
mode: rule
log-level: warning
external-controller: "0.0.0.0:9090"
secret: "li19882008"
bind-address: "*"
ipv6: true
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: true
  prefer-h3: false
  listen: "0.0.0.0:53"
  use-hosts: false
  use-system-hosts: false
  respect-rules: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - asusrouter.com
    - router.asus.com
    - www.asusrouter.com
    - oasisauth.h3c.com
    - routerlogin.com
    - www.routerlogin.com
    - tplogin.cn
    - miwifi.com
    - www.miwifi.com
    - +.internal
    - +.localdomain
    - +.example
    - +.invalid
    - +.localhost
    - +.test
    - +.local
    - +.lan
    - +.zte.home
    - +.my.router
    - +.ts.net
    - +.home.arpa
    - +.hiwifi.com
    - +.tplinkwifi.net
    - +.tendawifi.com
    - +.leike.cc
    - +.plex.direct
    - +.router.ctc
    - +.phicomm.me
    - +.peiluyou.com
    - +.127.in-addr.arpa
  default-nameserver:
    - tls://223.5.5.5
    - tls://119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

sniffer:
  enable: false
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geodata-loader: memconservative
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb"
profile:
  store-selected: true
  store-fake-ip: true

proxy-groups:
  - name: 🥳 打包代理
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: ✅ 自动选择
    type: url-test
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: false
    include-all: true

  - name: 🫱 手动选择
    type: select
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: false
    include-all: true

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: 🌈 Cloudflare
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 🤡 Onedrive
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 🥌 Microsoft
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 💯 Steam
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: ⚖️ 负载均衡
    type: load-balance
    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: true
    strategy: round-robin
    include-all: true

  - name: ⭕ 故障切换
    type: fallback
    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: true
    include-all: true

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
    hidden: true

  - name: ⚠️ 屏蔽广告
    type: select
    proxies:
      - REJECT
    hidden: true

