rules:
  # 自定义规则集
  - DOMAIN-SUFFIX,cloudflare.com,🌈 Cloudflare
  - DOMAIN-SUFFIX,gstatic.com,🥳 打包代理
  - DOMAIN-SUFFIX,jsdelivr.net,DIRECT
  - DOMAIN-SUFFIX,19882008.xyz,DIRECT
  - DOMAIN-SUFFIX,lancelot.dpdns.org,DIRECT
  # 域名规则集
  - RULE-SET,reject,REJECT
  - RULE-SET,Github,🥳 打包代理
  - RULE-SET,OneDrive,🤡 Onedrive
  - RULE-SET,Microsoft,🥌 Microsoft
  - RULE-SET,Google,🥳 打包代理
  - RULE-SET,Telegram,🥳 打包代理
  - RULE-SET,TikTok,🥳 打包代理
  - RULE-SET,Steam,💯 Steam
  - RULE-SET,GFW,🥳 打包代理
  - RULE-SET,Lan,DIRECT
  - RULE-SET,China,DIRECT
  # IP规则集
  - RULE-SET,GoogleIP,🥳 打包代理,no-resolve
  - RULE-SET,TelegramIP,🥳 打包代理,no-resolve
  - RULE-SET,LanIP,DIRECT
  - RULE-SET,ChinaIP,DIRECT
  - MATCH,🐟 漏网之鱼

