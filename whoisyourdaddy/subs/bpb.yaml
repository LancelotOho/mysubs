mixed-port: 7890
port: 7891
socks-port: 7892
allow-lan: true
mode: rule
log-level: warning
external-controller: "0.0.0.0:9090"
secret: "li19882008"
bind-address: "*"
ipv6: true
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: true
  prefer-h3: false
  listen: "0.0.0.0:53"
  use-hosts: false
  use-system-hosts: false
  respect-rules: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
