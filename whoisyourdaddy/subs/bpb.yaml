mixed-port: 7890
port: 7891
socks-port: 7892
allow-lan: true
mode: rule
log-level: warning
external-controller: "0.0.0.0:9090"
secret: "li19882008"
bind-address: "*"
ipv6: true
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
tun:
