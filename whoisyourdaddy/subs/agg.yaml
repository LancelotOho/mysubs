proxy-groups:
  - name: 🥳 打包代理
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: ✅ 自动选择
    type: url-test
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: false
    include-all: true

  - name: 🫱 手动选择
    type: select
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: false
    include-all: true

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: 🌈 Cloudflare
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 🤡 Onedrive
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 🥌 Microsoft
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 💯 Steam
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: ⚖️ 负载均衡
    type: load-balance
    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: true
    strategy: round-robin
    include-all: true

  - name: ⭕ 故障切换
    type: fallback
    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: true
    include-all: true

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
    hidden: true

  - name: ⚠️ 屏蔽广告
    type: select
    proxies:
      - REJECT
    hidden: true

