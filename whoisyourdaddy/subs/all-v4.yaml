proxy-groups:
  - name: 🥳打包代理
    type: select
    proxies:
      - ✅自动选择
      - ⚖️负载均衡
      - 🫱手动选择
      - ⭕故障切换
      - 🎯全球直连

  - name: ✅自动选择
    type: url-test
    interval: 300
    lazy: true
    tolerance: 200
    url: https://cp.cloudflare.com/generate_204
    include-all: true
    timeout: 2000

  - name: 🫱手动选择
    type: select
    include-all: true
    timeout: 2000

  - name: 🐟漏网之鱼
    type: select
    proxies:
      - ✅自动选择
      - ⚖️负载均衡
      - 🫱手动选择
      - ⭕故障切换
      - 🎯全球直连

  - name: ⚖️负载均衡
    type: load-balance
    interval: 300
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    strategy: round-robin
    include-all: true
    timeout: 2000

  - name: ⭕故障切换
    type: fallback
    interval: 300
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    include-all: true
    timeout: 2000

  - name: 🎯全球直连
    type: select
    proxies:
      - DIRECT
      - ✅自动选择
      - ⚖️负载均衡
      - 🫱手动选择
      - ⭕故障切换

  - name: ⚠️屏蔽广告
    type: select
    proxies:
      - REJECT
      - ✅自动选择
      - ⚖️负载均衡
      - 🫱手动选择
      - ⭕故障切换

