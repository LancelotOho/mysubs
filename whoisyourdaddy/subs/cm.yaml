proxy-groups:
  - name: 🥳 打包代理
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: ✅ 自动选择
    type: url-test
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    include-all: true

  - name: 🫱 手动选择
    type: select
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    include-all: true

  - name: 🐟 漏网之鱼
