    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    strategy: round-robin
    include-all: true

  - name: ⭕ 故障切换
    type: fallback
    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
