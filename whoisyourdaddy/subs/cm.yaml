      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 🥌 Microsoft
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 💯 Steam
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

