    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: 🌈 Cloudflare
    type: select
    proxies:
      - 🎯 全球直连
