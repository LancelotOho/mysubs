    type: url-test
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: false
    include-all: true

  - name: 🫱 手动选择
    type: select
    interval: 1800
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: false
    include-all: true

  - name: 🐟 漏网之鱼
