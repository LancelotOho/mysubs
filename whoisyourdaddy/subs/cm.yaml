      - ⭕ 故障切换

  - name: 🤡 Onedrive
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 🥌 Microsoft
    type: select
    proxies:
      - 🎯 全球直连
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换

  - name: 💯 Steam
    type: select
    proxies:
      - ✅ 自动选择
      - ⚖️ 负载均衡
      - 🫱 手动选择
      - ⭕ 故障切换
      - 🎯 全球直连

  - name: ⚖️ 负载均衡
    type: load-balance
    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: true
    strategy: round-robin
    include-all: true

  - name: ⭕ 故障切换
    type: fallback
    interval: 600
    lazy: true
    url: https://cp.cloudflare.com/generate_204
    hidden: true
    include-all: true

