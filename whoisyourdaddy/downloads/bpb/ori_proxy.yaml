{
    "mixed-port": 7890,
    "ipv6": true,
    "allow-lan": true,
    "unified-delay": false,
    "log-level": "warning",
    "mode": "rule",
    "disable-keep-alive": false,
    "keep-alive-idle": 10,
    "keep-alive-interval": 15,
    "tcp-concurrent": true,
    "geo-auto-update": true,
    "geo-update-interval": 168,
    "external-controller": "127.0.0.1:9090",
    "external-controller-cors": {
        "allow-origins": [
            "*"
        ],
        "allow-private-network": true
    },
    "external-ui": "ui",
    "external-ui-url": "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip",
    "profile": {
        "store-selected": true,
        "store-fake-ip": true
    },
    "dns": {
        "enable": true,
        "respect-rules": true,
        "use-system-hosts": false,
        "listen": "0.0.0.0:1053",
        "ipv6": true,
        "hosts": {
            "dns.google": [
                "8.8.8.8",
                "8.8.4.4",
                "2001:4860:4860::8888",
                "2001:4860:4860::8844"
            ]
        },
        "nameserver": [
            "https://dns.google/dns-query#✅ Selector"
        ],
        "proxy-server-nameserver": [
            "223.5.5.5#DIRECT"
        ],
        "direct-nameserver": [
            "223.5.5.5#DIRECT"
        ],
        "direct-nameserver-follow-policy": true,
        "nameserver-policy": {
            "rule-set:cn": "223.5.5.5#DIRECT"
        },
        "enhanced-mode": "redir-host"
    },
    "tun": {
        "enable": true,
        "stack": "mixed",
        "auto-route": true,
        "strict-route": true,
        "auto-detect-interface": true,
        "dns-hijack": [
            "any:53",
            "tcp://any:53"
        ],
        "mtu": 9000
    },
    "sniffer": {
        "enable": true,
        "force-dns-mapping": true,
        "parse-pure-ip": true,
        "override-destination": true,
        "sniff": {
            "HTTP": {
                "ports": [
                    80,
                    8080,
                    8880,
                    2052,
                    2082,
                    2086,
                    2095
                ]
            },
            "TLS": {
                "ports": [
                    443,
                    8443,
                    2053,
                    2083,
                    2087,
                    2096
                ]
            }
        }
    },
